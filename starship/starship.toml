command_timeout = 5000
add_newline = false

format = """
$directory$git_branch$git_status$fill$php$nodejs$python$cmd_duration
$character
"""

[directory]
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = " "

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged = "+${count}"
modified = "!${count}"
untracked = "?${count}"
deleted = "✘${count}"

[fill]
symbol = " "

[cmd_duration]
min_time = 1500
format = "took [$duration]($style) "

[php]
symbol = " "
format = "[$symbol($version )]($style) "

[nodejs]
symbol = " "
format = "[$symbol($version )]($style) "

[python]
symbol = " "
format = "[$symbol($version )]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"